services:
  scraper:
    build: .
    container_name: sermon-scraper
    volumes:
      - .:/app                    # Live code changes
      - ./audio:/app/audio        # Persist downloads
      - ./text:/app/text          # Persist transcripts
    cpus: "4.0"          # Give it up to 4 CPU cores
    mem_limit: "6g"      # Give it up to 6GB of RAM
    mem_reservation: "2g"
    stdin_open: true
    tty: true
